<svg width="800" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea44f;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#2ea44f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2ea44f;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c9d1d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2ea44f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="150" fill="url(#bg)" rx="12"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="798" height="148" fill="none" stroke="#21262d" stroke-width="1.5" rx="11"/>

  <!-- Corner brackets - top left -->
  <line x1="24" y1="24" x2="52" y2="24" stroke="#2ea44f" stroke-width="2"/>
  <line x1="24" y1="24" x2="24" y2="52" stroke="#2ea44f" stroke-width="2"/>

  <!-- Corner brackets - top right -->
  <line x1="776" y1="24" x2="748" y2="24" stroke="#2ea44f" stroke-width="2"/>
  <line x1="776" y1="24" x2="776" y2="52" stroke="#2ea44f" stroke-width="2"/>

  <!-- Corner brackets - bottom left -->
  <line x1="24" y1="126" x2="52" y2="126" stroke="#2ea44f" stroke-width="2"/>
  <line x1="24" y1="126" x2="24" y2="98" stroke="#2ea44f" stroke-width="2"/>

  <!-- Corner brackets - bottom right -->
  <line x1="776" y1="126" x2="748" y2="126" stroke="#2ea44f" stroke-width="2"/>
  <line x1="776" y1="126" x2="776" y2="98" stroke="#2ea44f" stroke-width="2"/>

  <!-- Subtle side dots -->
  <circle cx="14" cy="75" r="2" fill="#2ea44f" opacity="0.5"/>
  <circle cx="786" cy="75" r="2" fill="#2ea44f" opacity="0.5"/>

  <!-- Main title -->
  <text x="400" y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="bold"
    fill="url(#titleGrad)"
    text-anchor="middle"
    letter-spacing="1.5"
    filter="url(#shadow)">Casualties: Unknown</text>

  <!-- Green divider line -->
  <line x1="80" y1="95" x2="720" y2="95" stroke="url(#glow)" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="400" y="122"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="13"
    fill="#7d8590"
    text-anchor="middle"
    letter-spacing="5">РУССКАЯ ЛОКАЛИЗАЦИЯ</text>
</svg>
