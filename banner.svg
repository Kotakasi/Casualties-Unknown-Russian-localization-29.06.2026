<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casualties: Unknown — Русская локализация">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c100e"/>
      <stop offset="0.55" stop-color="#080a09"/>
      <stop offset="1" stop-color="#050606"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#1d3a32" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#102019" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#050606" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f6f2"/>
      <stop offset="1" stop-color="#aebfb4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="eyeglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- faint cave dot texture -->
  <g fill="#9fb7ac" opacity="0.05">
    <circle cx="120" cy="70" r="2"/><circle cx="220" cy="300" r="1.5"/><circle cx="360" cy="120" r="1.5"/>
    <circle cx="520" cy="60" r="2"/><circle cx="700" cy="320" r="1.5"/><circle cx="860" cy="90" r="2"/>
    <circle cx="980" cy="280" r="1.5"/><circle cx="1100" cy="120" r="2"/><circle cx="1180" cy="250" r="1.5"/>
    <circle cx="60" cy="200" r="1.5"/><circle cx="300" cy="220" r="1.5"/><circle cx="780" cy="150" r="1.5"/>
    <circle cx="1040" cy="60" r="1.5"/><circle cx="640" cy="240" r="1.5"/><circle cx="430" cy="300" r="1.5"/>
  </g>

  <!-- jagged cave floor silhouette -->
  <path d="M0,360 L0,330 L70,322 L150,338 L240,312 L330,334 L420,316 L520,336 L620,318 L720,338 L820,320 L930,338 L1030,322 L1130,340 L1210,326 L1280,338 L1280,360 Z" fill="#04100b" opacity="0.9"/>
  <path d="M0,360 L0,344 L120,338 L260,350 L430,340 L600,352 L760,342 L940,352 L1120,344 L1280,352 L1280,360 Z" fill="#020a07"/>

  <!-- bioluminescent eyes motif -->
  <g transform="translate(640,150)">
    <circle cx="-16" cy="0" r="6.5" fill="#39f0c0" filter="url(#eyeglow)"/>
    <circle cx="16" cy="0" r="6.5" fill="#39f0c0" filter="url(#eyeglow)"/>
    <circle cx="-16" cy="0" r="2.6" fill="#dffff5"/>
    <circle cx="16" cy="0" r="2.6" fill="#dffff5"/>
  </g>

  <!-- overline: game title -->
  <text x="640" y="116" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="22" letter-spacing="9"
        fill="#7e948a">CASUALTIES: UNKNOWN</text>

  <!-- main title -->
  <text x="640" y="220" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700"
        letter-spacing="2" fill="url(#title)">Русская локализация</text>

  <!-- subtitle -->
  <text x="640" y="266" text-anchor="middle"
        font-family="'Segoe UI', 'Trebuchet MS', sans-serif" font-size="21" letter-spacing="4"
        fill="#8aa99b">неофициальный перевод · от всей души · Kotakasi</text>

  <rect width="1280" height="360" fill="url(#vignette)"/>
</svg>
